<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LFRC EN VIVO - Fixture y Posiciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .bg-institucional { background-color: #3F3A85 !important; }
        .text-institucional { color: #3F3A85 !important; }
        .partido-container:hover { background-color: #f8f9fa; }
        .escudo-img { width: 28px; height: 28px; object-fit: contain; }
        .nav-link { cursor: pointer; }
        
        .fila-equipo { cursor: pointer; }
        .escudo-hover { transition: transform 0.2s ease-in-out; }
        .nombre-equipo { transition: color 0.2s ease-in-out; }
        
        .fila-equipo:hover .escudo-hover { transform: scale(1.3); }
        .fila-equipo:hover .nombre-equipo { color: #3F3A85 !important; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-institucional shadow-sm">
        <div class="container text-center justify-content-center">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="assets/logo-lrfrc.png" alt="LFRC" class="me-2" style="width: 40px; height: 40px; object-fit: contain;">
                <span class="fs-5 fw-bold mb-0">LIGA REGIONAL DE FÚTBOL RÍO CUARTO</span>
            </a>
        </div>
    </nav>

    <div class="container mt-4">
        <ul class="nav nav-tabs mb-3 border-0" id="ligaTabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active fw-bold text-dark border-0 border-bottom border-3 border-institucional" id="fixture-tab" data-bs-toggle="tab" data-bs-target="#fixture" type="button" role="tab">Fecha Actual</button>
            </li>
            <li class="nav-item">
                <button class="nav-link fw-bold text-muted border-0" id="posiciones-tab" data-bs-toggle="tab" data-bs-target="#posiciones" type="button" role="tab">Tabla de posiciones</button>
            </li>
            <li class="nav-item">
                <button class="nav-link fw-bold text-muted border-0" id="goleadores-tab" data-bs-toggle="tab" data-bs-target="#goleadores" type="button" role="tab">Tabla de goleadores</button>
            </li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="fixture" role="tabpanel">
                <div id="contenedor-fixture">
                    <div class="text-center p-5 text-muted">Cargando la fecha...</div>
                </div>
            </div>
            <div class="tab-pane fade" id="posiciones" role="tabpanel">
                <div id="contenedor-posiciones">
                    <div class="text-center p-5 text-muted">Cargando tablas de posiciones...</div>
                </div>
            </div>
            <div class="tab-pane fade" id="goleadores" role="tabpanel">
                <div class="card border-0 shadow-sm overflow-hidden mb-4">
                    <div class="card-header text-white fw-bold bg-institucional">TABLA DE GOLEADORES</div>
                    <div class="table-responsive">
                        <table class="table table-hover mb-0 align-middle">
                            <thead class="table-light text-muted small text-uppercase">
                                <tr>
                                    <th class="text-center" style="width: 50px;">#</th>
                                    <th>Jugador</th>
                                    <th>Equipo</th>
                                    <th class="text-center">Goles</th>
                                </tr>
                            </thead>
                            <tbody id="lista-goleadores">
                                <tr><td colspan="4" class="text-center p-4">Cargando goleadores...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api'; // <-- CAMBIO A RUTA RELATIVA

        // LÓGICA PARA TRADUCIR LA FECHA AL ESPAÑOL PARA EL PUBLICO
        function formatFechaParaPublico(fechaIso) {
            if (!fechaIso) return 'A conf.';
            const d = new Date(fechaIso);
            const dia = String(d.getDate()).padStart(2, '0');
            const mes = String(d.getMonth() + 1).padStart(2, '0');
            const horas = String(d.getHours()).padStart(2, '0');
            const mins = String(d.getMinutes()).padStart(2, '0');
            return `${dia}/${mes} - ${horas}:${mins} hs`;
        }

        async function fetchPartidos() {
            try {
                const res = await fetch(`${API_URL}/partidos`);
                const partidos = await res.json();
                const contenedor = document.getElementById('contenedor-fixture');
                contenedor.innerHTML = '';

                const grupos = {};
                partidos.forEach(p => {
                    let nombreGrupo = p.club_local.id_division === 1 ? 'PRIMERA A - FECHA 1' : `PRIMERA B - ZONA ${p.club_local.zona?.toUpperCase() || 'S/N'} - FECHA 1`;
                    if (!grupos[nombreGrupo]) grupos[nombreGrupo] = [];
                    grupos[nombreGrupo].push(p);
                });

                for (const [nombre, lista] of Object.entries(grupos)) {
                    const card = document.createElement('div');
                    card.className = 'card border-0 shadow-sm mb-4';
                    
                    let htmlLista = '';
                    lista.forEach(p => {
                        // CONDICIONAL PARA ESTADOS: Programado, En Vivo (PT, ET, ST) o Finalizado
                        let estadoHTML = '';
                        let colorEstado = 'text-secondary';
                        let colorMarcador = '';

                        if (p.estado === 'Programado') {
                            estadoHTML = formatFechaParaPublico(p.fecha_hora);
                        } else if (['PT', 'ET', 'ST', 'En vivo'].includes(p.estado)) {
                            estadoHTML = p.estado;
                            colorEstado = 'text-danger';
                            colorMarcador = 'text-danger'; // El marcador también se pinta de rojo si es en vivo
                        } else {
                            estadoHTML = 'FINALIZADO';
                        }

                        htmlLista += `
                            <li class="list-group-item p-0 partido-container border-bottom" style="cursor: pointer;" onclick="window.location.href='partido.html?id=${p.id_partido}'">
                                <div class="d-flex justify-content-between align-items-center py-2 px-3 partido-item">
                                    <div class="estado ${colorEstado} fw-bold text-nowrap" style="width: 20%; font-size: 0.80rem;">
                                        ${estadoHTML}
                                    </div>
                                    <div class="equipo text-end d-flex justify-content-end align-items-center" style="width: 30%;">
                                        <span class="d-none d-sm-inline">${p.club_local.nombre}</span>
                                        <span class="d-inline d-sm-none fw-bold">${p.club_local.acronimo}</span>
                                        <img src="${p.club_local.escudo_url}" class="ms-2 escudo-img" alt="${p.club_local.acronimo}">
                                    </div>
                                    <div class="resultado fw-bold text-center text-nowrap fs-5 ${colorMarcador}" style="width: 20%;">
                                        ${p.goles_local} - ${p.goles_visitante}
                                    </div>
                                    <div class="equipo text-start d-flex justify-content-start align-items-center" style="width: 30%;">
                                        <img src="${p.club_visitante.escudo_url}" class="me-2 escudo-img" alt="${p.club_visitante.acronimo}">
                                        <span class="d-none d-sm-inline">${p.club_visitante.nombre}</span>
                                        <span class="d-inline d-sm-none fw-bold">${p.club_visitante.acronimo}</span>
                                    </div>
                                </div>
                            </li>
                        `;
                    });

                    card.innerHTML = `<div class="card-header text-white fw-bold bg-institucional">${nombre}</div><ul class="list-group list-group-flush">${htmlLista}</ul>`;
                    contenedor.appendChild(card);
                }
            } catch (e) {
                document.getElementById('contenedor-fixture').innerHTML = '<div class="alert alert-danger m-3">Error de conexión.</div>';
            }
        }

        function renderTabla(contenedor, titulo, equipos) {
            const card = document.createElement('div');
            card.className = 'card border-0 shadow-sm overflow-hidden mb-4';
            
            let filasHtml = '';
            equipos.forEach((eq, index) => {
                const resaltado = (index === 0 && eq.pj > 0) ? 'table-success' : '';
                filasHtml += `
                    <tr class="${resaltado} fila-equipo" onclick="window.location.href='equipo.html?id=${eq.id_club}'" title="Ver perfil de ${eq.nombre}">
                        <td class="fw-bold text-muted align-middle">${index + 1}</td>
                        <td class="text-start fw-bold text-dark align-middle">
                            <img src="${eq.escudo_url}" class="escudo-img me-2 escudo-hover" alt="Escudo">
                            <span class="d-none d-sm-inline nombre-equipo">${eq.nombre}</span>
                            <span class="d-inline d-sm-none nombre-equipo">${eq.nombre.substring(0,3).toUpperCase()}</span>
                        </td>
                        <td class="fw-bold fs-5 text-institucional align-middle">${eq.pts}</td>
                        <td class="align-middle">${eq.pj}</td>
                        <td class="align-middle">${eq.pg}</td>
                        <td class="align-middle">${eq.pe}</td>
                        <td class="align-middle">${eq.pp}</td>
                        <td class="align-middle">${eq.gf}</td>
                        <td class="align-middle">${eq.gc}</td>
                        <td class="${eq.dif > 0 ? 'text-success' : (eq.dif < 0 ? 'text-danger' : '')} fw-bold align-middle">
                            ${eq.dif > 0 ? '+'+eq.dif : eq.dif}
                        </td>
                    </tr>
                `;
            });

            card.innerHTML = `
                <div class="card-header text-white fw-bold bg-institucional d-flex justify-content-between align-items-center">
                    <span>${titulo}</span>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle text-center" style="font-size: 0.9rem;">
                        <thead class="table-light text-muted small">
                            <tr>
                                <th style="width: 40px;">#</th>
                                <th class="text-start">EQUIPO</th>
                                <th class="fw-bold text-dark fs-6">PTS</th>
                                <th>PJ</th><th>PG</th><th>PE</th><th>PP</th><th>GF</th><th>GC</th><th>DIF</th>
                            </tr>
                        </thead>
                        <tbody>${filasHtml}</tbody>
                    </table>
                </div>
            `;
            contenedor.appendChild(card);
        }

        async function fetchPosiciones() {
            try {
                const [resA, resB] = await Promise.all([ fetch(`${API_URL}/posiciones/a`), fetch(`${API_URL}/posiciones/b`) ]);
                const posA = await resA.json();
                const posB = await resB.json();
                const contenedor = document.getElementById('contenedor-posiciones');
                contenedor.innerHTML = '';

                if(posA.length > 0) renderTabla(contenedor, 'PRIMERA A - POSICIONES', posA);

                const zonasB = { 'CENTRO': [], 'NORTE': [], 'SUR': [] };
                posB.forEach(eq => {
                    const zona = eq.zona ? eq.zona.toUpperCase() : 'CENTRO';
                    if(!zonasB[zona]) zonasB[zona] = [];
                    zonasB[zona].push(eq);
                });

                for (const [zona, equipos] of Object.entries(zonasB)) {
                    if (equipos.length > 0) renderTabla(contenedor, `PRIMERA B - ZONA ${zona}`, equipos);
                }
            } catch (e) { document.getElementById('contenedor-posiciones').innerHTML = '<div class="alert alert-danger m-3">Error al cargar las tablas.</div>'; }
        }

        async function fetchGoleadores() {
            try {
                const res = await fetch(`${API_URL}/goleadores`);
                const goleadores = await res.json();
                const tbody = document.getElementById('lista-goleadores');
                tbody.innerHTML = '';

                if (goleadores.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center p-4">Aún no hay goles registrados.</td></tr>';
                    return;
                }

                goleadores.forEach((g, index) => {
                    const tr = document.createElement('tr');
                    if(index === 0) tr.classList.add('table-warning');

                    tr.innerHTML = `
                        <td class="text-center fw-bold text-muted">${index + 1}</td>
                        <td class="fw-bold text-dark">${g.nombre} ${g.apellido}</td>
                        <td class="text-secondary small">
                            <img src="${g.escudo_url}" style="width: 18px; height: 18px; object-fit: contain;" class="me-1">
                            ${g.club}
                        </td>
                        <td class="text-center fw-bold fs-5 text-institucional">${g.goles}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (e) { document.getElementById('lista-goleadores').innerHTML = '<tr><td colspan="4" class="text-center text-danger p-4">Error al cargar la tabla de goleadores.</td></tr>'; }
        }

        const tabButtons = document.querySelectorAll('.nav-link');
        tabButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                tabButtons.forEach(b => {
                    b.classList.remove('text-dark', 'border-bottom', 'border-3', 'border-institucional');
                    b.classList.add('text-muted');
                });
                this.classList.remove('text-muted');
                this.classList.add('text-dark', 'border-bottom', 'border-3', 'border-institucional');
            });
        });

        fetchPartidos();
        fetchPosiciones();
        fetchGoleadores();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
